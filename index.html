<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maceió 40 Graus | Maior portal de Alagoas</title>
  <link rel="stylesheet" type="text/css" href="slick/slick.css"/>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="./js/jquery-3.6.3.js"></script>
</head>
<body>
  <header class="header-bg">
    <div class="header container">
      <a href=""><img class="logo" src="./img/logo.svg" alt="Logo Maceio40Graus" height="60px"></a>
      <nav>
        <ul class="header-menu font-r ">
          <li><a href="">Fotos</a></li>
          <li><a href="">Agenda</a></li>
          <li><a href="">Notícias</a></li>
          <li><a href="">Contato</a></li>
          <div class="search">
            <input type="text" placeholder="Pesquisar...">
            <a href="">
              <img src="./img/search.svg" alt="lupa" height="20px">
            </a>
          </div>
          <span class="date">07/03/2023</span>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main container">
    <h2 class="title font-r-b cor-destaque">Destaques</h2>
    <img src="./img/prev-arrow.svg" class="prev-arrow arrow">
      
      <div class="destaques">
        
        <a href="/">
        <div class="image-container">
          <div class="layer"></div>
          <div class="text-container">
            <h2 class="font-x-b cor-titulo-destaque">Festival Carnívoros</h2>
            <p class="font-r-b cor-0">O melhor festival de carna de todos os tempos</p>
          </div>
          <img src="./img/bgs/carnivoro.jpg" alt="">        
        </div>
        </a>
        
        <div class="image-container">
          <div class="layer"></div>
          <div class="text-container">
            <h2 class="font-x-b cor-titulo-destaque">Eletro White</h2>
            <p class="font-r-b cor-0">Mais uma festa com todo mundo de Branco</p>
          </div>
          <img src="./img/bgs/eletro.jpg" alt="">
        </div>

        <div class="image-container">
          <div class="layer"></div>
          <div class="text-container">
            <h2 class="font-x-b cor-titulo-destaque">Congresso de Murici</h2>
            <p class="font-r-b cor-0">Prefeiro recebeu todos os professores</p>
          </div>
          <img src="./img/bgs/politica.jpg" alt="">
        </div>
      
      </div>
      
      <img src="./img/next-arrow.svg" class="next-arrow arrow">
     
  </main>
  

  <script type="text/javascript" defer src="slick/slick.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
